<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사진첩 - 포피스</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  
<section style="padding: 80px 60px;">
  <h2>사진첩</h2>
  <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; margin-top: 32px;"><div style="border: 1px solid #ddd; border-radius: 12px; overflow: hidden;">
      
        <img src="/images/uploads/img_3176.jpg" style="width: 100%; height: 180px; object-fit: cover;" />
      
      <div style="padding: 16px;">
        <span style="background: #e8f5ee; color: #1a5c38; padding: 3px 10px; border-radius: 20px; font-size: 12px;">하나린</span>
        <h3 style="margin-top: 10px; font-size: 16px;">테스트 중 입니다.</h3>
        <p style="color: #888; font-size: 13px;">Sun May 24 2026 14:26:00 GMT+0900 (Korean Standard Time)</p>
      </div>
    </div></div>
</section>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
