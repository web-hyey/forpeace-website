---
layout: base.html
title: 사진첩
permalink: /gallery/
---

<section style="padding: 80px 60px;">
  <h2>사진첩</h2>
  <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; margin-top: 32px;">
  {%- for post in collections.gallery | reverse -%}
    <div style="border: 1px solid #ddd; border-radius: 12px; overflow: hidden;">
      {% if post.data.thumbnail %}
        <img src="{{ post.data.thumbnail }}" style="width: 100%; height: 180px; object-fit: cover;" />
      {% endif %}
      <div style="padding: 16px;">
        <span style="background: #e8f5ee; color: #1a5c38; padding: 3px 10px; border-radius: 20px; font-size: 12px;">{{ post.data.category }}</span>
        <h3 style="margin-top: 10px; font-size: 16px;">{{ post.data.title }}</h3>
        <p style="color: #888; font-size: 13px;">{{ post.data.date }}</p>
      </div>
    </div>
  {%- endfor -%}
  </div>
</section>
